# Hooks for local development. See CONTRIBUTING.md for setup.
# CI mirrors this config in .github/workflows/tests.yml:
#   - pre-commit job: yaml + buildifier + shellcheck (--all-files, SKIP=ktlint)
#   - ktlint job:     ktlint hook on changed .kt/.kts files (uses Bazel)
#   - bazel-test klint matrix: full repo via Bazel ktlint_test

default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]

  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 8.0.3
    hooks:
      - id: buildifier

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: ktlint
        name: ktlint (kotlin formatter and linter)
        entry: tools/pre-commit/ktlint.sh
        language: script
        files: \.(kt|kts)$
        pass_filenames: true
