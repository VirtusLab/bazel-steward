name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bazel-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            tag: unit
          - name: integration
            tag: integration
          - name: klint
            tag: lint
    name: ${{ matrix.name }}-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'maven_install.json') }}
          restore-keys: |
            ${{ runner.os }}-bazel-
      - name: Run tests
        run: bazel test //... --keep_going --test_tag_filters=${{ matrix.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: ktlint
        with:
          extra_args: --all-files
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'maven_install.json') }}
          restore-keys: |
            ${{ runner.os }}-bazel-
      - name: Run ktlint pre-commit hook on changed Kotlin files
        env:
          FROM_REF: >-
            ${{ github.event_name == 'pull_request'
                && github.event.pull_request.base.sha
                || github.event.before }}
        run: |
          set -euo pipefail
          from_ref="${FROM_REF}"
          if [ -z "${from_ref}" ] || [ "${from_ref}" = "0000000000000000000000000000000000000000" ]; then
            from_ref="HEAD^"
          fi
          pre-commit run ktlint --from-ref "${from_ref}" --to-ref HEAD

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Integration tests
        uses: ./
        with:
          use-release: "false"
          push-to-remote: "false"
