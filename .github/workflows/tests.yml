name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bazel-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: unit
            tag: unit
          - name: integration
            tag: integration
          - name: klint
            tag: lint
    name: ${{ matrix.name }}-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 11
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', '.bazelrc', 'MODULE.bazel', 'MODULE.bazel.lock', 'maven_install.json') }}
          restore-keys: |
            ${{ runner.os }}-bazel-
      - name: Run tests
        run: bazel test //... --keep_going --test_tag_filters=${{ matrix.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Integration tests
        uses: ./
        with:
          use-release: "false"
          push-to-remote: "false"
  buildifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install buildifier
        run: |
          set -euo pipefail
          BUILDIFIER_VERSION=v8.0.3
          curl -sSLo /usr/local/bin/buildifier \
            "https://github.com/bazelbuild/buildtools/releases/download/${BUILDIFIER_VERSION}/buildifier-linux-amd64"
          chmod +x /usr/local/bin/buildifier
      - name: Run buildifier
        run: buildifier -r -mode=check .
      - run: git diff --exit-code
