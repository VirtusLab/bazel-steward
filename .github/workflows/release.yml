name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches: [ main ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tagged-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-release-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel', 'maven_install.json') }}
          restore-keys: |
            ${{ runner.os }}-bazel-release-
            ${{ runner.os }}-bazel-
      - name: Build deploy jar
        run: bazel build //app:app_deploy.jar
      - name: Stage jar
        run: cp bazel-bin/app/app_deploy.jar bazel-steward.jar
      - name: Publish tagged release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: bazel-steward.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
      - name: Publish rolling "latest" pre-release
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: bazel-steward.jar
          fail_on_unmatched_files: true
          name: Development Build
          tag_name: latest
          prerelease: true

  maven-release:
    runs-on: ubuntu-latest
    needs: tagged-release
    if: github.ref_type == 'tag'
    env:
      MAVEN_GROUP: org.virtuslab
      MAVEN_ARTIFACT: bazel-steward
      MAVEN_PROFILE: org.virtuslab
      # Central Portal's OSSRH-compatible staging API.
      # oss.sonatype.org was sunset on 2025-06-30; this endpoint keeps the
      # Nexus 2 upload surface alive for existing tooling. See
      # https://central.sonatype.org/pages/ossrh-eol/
      MAVEN_REPO: https://ossrh-staging-api.central.sonatype.com/service/local
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-release-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel', 'maven_install.json') }}
          restore-keys: |
            ${{ runner.os }}-bazel-release-
            ${{ runner.os }}-bazel-
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PGP_SECRET }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}
      - name: Derive release version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Inject release version into version.bzl
        run: python3 tools/publish/set_version.py --version "${{ steps.version.outputs.version }}"
      - name: Upload to Central Portal staging
        run: |
          bazel run --stamp \
            --define "maven_repo=${MAVEN_REPO}" \
            --define "maven_user=${SONATYPE_USERNAME}" \
            --define "maven_password=${SONATYPE_PASSWORD}" \
            //app:maven.publish
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
      - name: Close and release staging repository
        run: |
          bazel run //tools/publish:release_staged -- \
            --profile "${MAVEN_PROFILE}" \
            --group "${MAVEN_GROUP}" \
            --artifact "${MAVEN_ARTIFACT}" \
            --version "${{ steps.version.outputs.version }}"
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Restore version.bzl
        if: always()
        run: python3 tools/publish/set_version.py --restore

  prefix-version-tag:
    runs-on: ubuntu-latest
    needs: tagged-release
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update vMAJOR / vMAJOR.MINOR tags
        run: |
          set -euo pipefail
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          MINOR_TAG=$(echo "$GIT_TAG" | grep -Eo 'v[0-9]+\.[0-9]+')
          MAJOR_TAG=$(echo "$GIT_TAG" | grep -Eo 'v[0-9]+')
          for TAG in "$MINOR_TAG" "$MAJOR_TAG"; do
            TAG_LATEST=$(git ls-remote --tags origin \
              | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -E "^${TAG}\." \
              | sort -Vr | head -n 1 || true)
            if [ "$GIT_TAG" = "$TAG_LATEST" ]; then
              git tag -f "$TAG" "$GIT_TAG"
              git push -f origin "refs/tags/$TAG"
            fi
          done
