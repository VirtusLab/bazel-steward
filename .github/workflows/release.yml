name: Release

on:
  push:
    tags:
      - "v*.*.*"
    branches: [ main ]

jobs:
  tagged-release:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - run: bazel build //app:app_deploy.jar //action:resolve_release_tag_cli_deploy.jar
        name: Build project jars
      - name: Verify action release-tag matches git tag
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          ACTION_TAG="$(bazel run //action:resolve_release_tag_cli -- --read-action-yaml "$GITHUB_WORKSPACE")"
          if [ "$GIT_TAG" != "$ACTION_TAG" ]; then
            echo "action.yaml release-tag ($ACTION_TAG) must match git tag ($GIT_TAG)"
            exit 1
          fi
      - run: mv bazel-bin/app/app_deploy.jar bazel-steward.jar
        name: Rename steward jar
      - run: cp bazel-bin/action/resolve_release_tag_cli_deploy.jar action/resolve-release-tag.jar
        name: Copy resolve-release-tag jar into action tree
      - uses: marvinpinto/action-automatic-releases@v1.2.1
        name: Publish
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref, '-') }}
          title: ${{ github.ref_type != 'tag' && 'Development Build' || null }}
          automatic_release_tag: ${{ github.ref_type != 'tag' && 'latest' || null }}
          files: |
            bazel-steward.jar
            action/resolve-release-tag.jar
  maven-release:
    runs-on: "ubuntu-latest"
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.PGP_SECRET }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}
      - run: bazel run --stamp --define "MAVEN_VERSION=${GITHUB_REF#refs/*/v}" //tools/publish:maven_central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        name: "Release to maven central"
  maven-smoke-test:
    runs-on: "ubuntu-latest"
    needs: maven-release
    steps:
      - uses: actions/checkout@v4
      - run: ./tools/publish/smoke-test.sh "${GITHUB_REF#refs/*/v}" 600
        name: "Verify artifact on Maven Central"
  prefix-version-tag:
    runs-on: "ubuntu-latest"
    if: github.ref_type == 'tag' && !contains(github.ref, '-')
    needs: tagged-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          set -x
          GIT_TAG=$(echo "${{ github.event.ref }}" | grep -Eo 'v[\.0-9]*')
          MINOR_TAG=$(echo "$GIT_TAG" | grep -Eo 'v[0-9]+\.[0-9]+')
          MAJOR_TAG=$(echo "$GIT_TAG" | grep -Eo 'v[0-9]+')
          for TAG in "$MINOR_TAG" "$MAJOR_TAG"
          do
            TAG_LATEST=$(git ls-remote --tags | grep -Eo "v[0-9]+\.[0-9]+\.[0-9]+" | grep -E "$TAG" | sort -Vr | head -n 1)
            if [ "$GIT_TAG" == "$TAG_LATEST" ]; then
              git tag -f "$TAG" "$GIT_TAG"
              git push -f origin "$TAG"
            fi
          done